<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I-595 Toll-Plaza Flow — SUMO × Cesium</title>
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <!-- Title + scenario story -->
    <div id="hud" class="panel">
      <div class="hud-eyebrow">OPERATIONAL DIGITAL TWIN</div>
      <div class="hud-title">Toll-Plaza Throughput</div>
      <div class="hud-sub">SuperDNA Tech</div>

      <select id="site-select" class="site-select" title="Same SUMO plaza, different real toll corridor"></select>

      <div class="toggle">
        <button id="btn-baseline" class="on">Today · 3 cash + 7 AET</button>
        <button id="btn-intervention">Convert 2 cash → AET</button>
        <button id="btn-live">● LIVE</button>
      </div>

      <div id="kpis" class="kpis"></div>

      <!-- Animated cumulative revenue counter — the headline "wow" number -->
      <div class="rev-counter-wrap">
        <div id="revenue-counter" class="rev-counter">$0</div>
        <div class="rev-counter-label">cumulative revenue (sim window)</div>
      </div>

      <!-- Cash vs AET comparison card -->
      <div id="cash-aet-card" class="cash-aet-card"></div>

      <div class="legend">
        <span><i class="sw cash"></i> Cash booth</span>
        <span><i class="sw etc"></i> AET booth</span>
      </div>

      <!-- Weather preset selector -->
      <div class="ctl-row">
        <label class="weather-label" for="weather-select">Weather</label>
        <select id="weather-select" class="weather-select" title="Apply weather conditions (live mode sends to SUMO server)">
          <option value="clear">Clear</option>
          <option value="lightrain">Light Rain</option>
          <option value="heavyrain">Heavy Rain</option>
          <option value="fog">Fog</option>
          <option value="snowice">Snow-Ice</option>
        </select>
      </div>

      <!-- Camera + live gate controls -->
      <div class="ctl-row">
        <button id="btn-view" class="mini">Oblique view</button>
        <button id="btn-calib" class="mini">⊕ Mark gates</button>
        <span id="conn" class="conn off">socket: offline</span>
      </div>

      <div id="gatePanel" class="gates hidden">
        <div class="gates-h">Booth gates — click to close / open (B0–B2 cash, rest AET)</div>
        <div id="gates-all" class="gate-grid"></div>
      </div>

      <div id="status" class="status">Loading…</div>
    </div>

    <!-- Full-viewport weather tint overlay (toggled by main.js applyWeatherOverlay) -->
    <div id="weather-overlay" style="display:none"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
